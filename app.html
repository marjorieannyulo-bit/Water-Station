<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>
<link rel="stylesheet" href="style.css">

<style>
/* EXTRA UI IMPROVEMENTS (ONLY FOR SERVICES PAGE) */

.section {
    margin-bottom: 20px;
    text-align: left;
}

.section h3 {
    margin-bottom: 8px;
    color: #0077aa;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 10px;
}

.info-box {
    background: #f5fbff;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
}

/* SELECT IMPROVED */
select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #fff;
}

/* FADE ANIMATION */
.fade {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<nav class="navbar">
  <div class="nav-container">

    <!-- LOGO -->
    <div class="logo" ondblclick="adminAccess()">
      <img src="logo.jpeg" alt="Logo">
      <span>CJ's Water Station</span>
    </div>

    <!-- HAMBURGER BUTTON -->
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <!-- NAV LINKS -->
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="app.html?view=services">Services</a>
      <a href="auth.html">Login</a>
    </div>

  </div>
</nav>
<div class="page">
<div class="card fade" id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const view = params.get("view");
const content = document.getElementById("content");

/* MAIN */
if(view === "services"){
content.innerHTML = `
<h2>Our Services</h2>

<div class="grid">

<div class="service-card">
<img src="refill.jpeg">
<h3>Water Refill</h3>
<button class="primary" onclick="detail('refill')">Order Now</button>
<button class="secondary" onclick="detail('refill')">View Details</button>
</div>

<div class="service-card">
<img src="deliver.jpeg">
<h3>Delivery</h3>
<button class="secondary" onclick="detail('delivery')">View Details</button>
</div>

<div class="service-card">
<img src="bottle.jpeg">
<h3>Containers</h3>
<button class="primary" onclick="detail('container')">Order Now</button>
<button class="secondary" onclick="detail('container')">View Details</button>
</div>

</div>
`;
}

/* DETAIL */
function detail(type){

if(type === "refill"){
content.innerHTML = `
<h2>Water Refill Service</h2>

<div class="section">
<p>
A reliable refill service that ensures your drinking water is clean, safe, and purified using a multi-stage filtration process.
</p>
</div>

<div class="section">
<h3>💡 Highlights</h3>
<div class="info-grid">
<div class="info-box">Multi-stage filtration system</div>
<div class="info-box">UV sterilization process</div>
<div class="info-box">Quality-checked per batch</div>
<div class="info-box">Safe for daily consumption</div>
</div>
</div>

<div class="section">
<h3>📦 Sizes Available</h3>
<div class="info-grid">
<div class="info-box">5 Gallons</div>
<div class="info-box">10 Gallons</div>
<div class="info-box">15 Gallons</div>
</div>
</div>

<div class="section">
<h3>🎉 Promo</h3>
<div class="info-box">
Buy or refill 5 containers and get discounts or bonus rewards.
</div>
</div>

<hr>

<h3>Order Form</h3>

<input placeholder="Full Name" id="name">
<input placeholder="Address" id="address">
<input placeholder="Contact Number" id="phone">

<select id="size">
<option value="">Select Size</option>
<option>5 Gallons</option>
<option>10 Gallons</option>
<option>15 Gallons</option>
</select>

<input type="number" placeholder="Quantity" id="qty">
<input type="date" id="date">

<button class="primary" onclick="submitOrder('refill')">Submit Order</button>
<button class="secondary" onclick="goBack()">Back</button>
`;
}

if(type === "container"){
content.innerHTML = `
<h2>Water Containers</h2>

<div class="section">
<p>
High-quality, durable containers made from food-grade materials to ensure safe water storage and long-term use.
</p>
</div>

<div class="section">
<h3>💡 Features</h3>
<div class="info-grid">
<div class="info-box">BPA-free material</div>
<div class="info-box">Leak-proof design</div>
<div class="info-box">Reusable & durable</div>
<div class="info-box">Hygienic storage</div>
</div>
</div>

<div class="section">
<h3>📦 Sizes</h3>
<div class="info-grid">
<div class="info-box">5 Gallons</div>
<div class="info-box">10 Gallons</div>
<div class="info-box">15 Gallons</div>
</div>
</div>

<div class="section">
<h3>🎉 Promo</h3>
<div class="info-box">
Buy 5 containers and get bundle discounts or special offers.
</div>
</div>

<hr>

<h3>Order Form</h3>

<input placeholder="Full Name" id="name">
<input placeholder="Address" id="address">
<input placeholder="Contact Number" id="phone">

<select id="size">
<option value="">Select Size</option>
<option>5 Gallons</option>
<option>10 Gallons</option>
<option>15 Gallons</option>
</select>

<input type="number" placeholder="Quantity" id="qty">
<input type="date" id="date">

<button class="primary" onclick="submitOrder('container')">Submit Order</button>
<button class="secondary" onclick="goBack()">Back</button>
`;
}

if(type === "delivery"){
content.innerHTML = `
<h2>Delivery Service</h2>

<div class="section">
<p>
Convenient home delivery of purified drinking water with safe handling and timely dispatch.
</p>
</div>

<div class="section">
<h3>🚚 Delivery Info</h3>
<div class="info-grid">
<div class="info-box">Fee: ₱50 - ₱100</div>
<div class="info-box">Coverage: Nearby areas only</div>
<div class="info-box">Time: 1–3 hours</div>
<div class="info-box">Payment: Cash on Delivery</div>
</div>
</div>

<div class="section">
<h3>⚠️ Notes</h3>
<div class="info-box">
Delivery is only available within serviceable areas. Orders are processed based on location and availability.
</div>
</div>

<button class="secondary" onclick="goBack()">Back</button>
`;
}

}

/* ORDER */
function submitOrder(type){

if(!localStorage.getItem("session")){
location="auth.html";
return;
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders.push({
user: localStorage.getItem("session"),
service: type,
name: document.getElementById("name").value,
address: document.getElementById("address").value,
phone: document.getElementById("phone").value,
size: document.getElementById("size")?.value,
qty: document.getElementById("qty")?.value,
date: document.getElementById("date")?.value,
status: "Pending"
});

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order submitted!");
location="app.html?view=services";
}

/* BACK */
function goBack(){
location="app.html?view=services";
}
</script>
<script>
function adminAccess(){
    let pass = prompt("Enter admin password:");

    if(pass === "1234"){
        localStorage.setItem("session","admin");
        location = "admin.html";
    } else {
        alert("Access denied");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Water Station Order</title>
</head>
<body>

<h2>Place Order</h2>

<form id="orderForm">
  <input type="text" id="name" placeholder="Name" required><br><br>
  <input type="text" id="address" placeholder="Address" required><br><br>

  <select id="service">
    <option value="Refill">Refill</option>
    <option value="Delivery">Delivery</option>
    <option value="Container">Container</option>
  </select><br><br>

  <button type="submit">Submit Order</button>
</form>

<p id="message"></p>

<script src="script.js"></script>

</body>
</html>
